kind = "web"
previewPath = "/"
title = "Perfume Inventory"
version = "1.0.0"
id = "artifacts/inventory"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
localPort = 18174
name = "web"
paths = ["/"]

[services.development]
run = "pnpm --filter @workspace/inventory run dev"

[services.env]
PORT = "18174"
BASE_PATH = "/"

[services.production]
build = ["pnpm", "--filter", "@workspace/inventory", "run", "build"]
publicDir = "artifacts/inventory/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"
