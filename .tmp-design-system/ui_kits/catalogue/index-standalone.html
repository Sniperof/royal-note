<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Royal Note — Wholesale Fragrance Catalogue</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,600;0,9..144,700;1,9..144,400;1,9..144,600&family=Outfit:wght@400;500;600;700&display=swap" rel="stylesheet">
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; }
  body { font-family: 'Outfit', sans-serif; background: #FAF9F5; color: #141413; -webkit-font-smoothing: antialiased; }
  button { font-family: 'Outfit', sans-serif; }
  input, select { font-family: 'Outfit', sans-serif; }
  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: #D4D4D4; border-radius: 3px; }
</style>

<template id="__bundler_thumbnail" data-bg-color="#141413">
  <svg viewBox="0 0 240 160" xmlns="http://www.w3.org/2000/svg">
    <!-- Sparkle mark -->
    <line x1="28" y1="18" x2="28" y2="42" stroke="#fff" stroke-width="1.5" stroke-linecap="round"/>
    <line x1="16" y1="30" x2="40" y2="30" stroke="#fff" stroke-width="1.5" stroke-linecap="round"/>
    <line x1="19" y1="19" x2="37" y2="41" stroke="#fff" stroke-width="1.5" stroke-linecap="round"/>
    <line x1="37" y1="19" x2="19" y2="41" stroke="#fff" stroke-width="1.5" stroke-linecap="round"/>
    <!-- Wordmark -->
    <text x="50" y="34" font-family="serif" font-size="18" font-weight="700" fill="#fff" letter-spacing="-0.5">Royal Note</text>
    <text x="50" y="46" font-family="sans-serif" font-size="7" font-weight="500" fill="rgba(255,255,255,0.4)" letter-spacing="2">WHOLESALE FRAGRANCE</text>
    <!-- Card grid silhouette -->
    <rect x="16" y="68" width="46" height="62" rx="5" fill="#FAF9F5" opacity="0.12"/>
    <rect x="68" y="68" width="46" height="62" rx="5" fill="#FAF9F5" opacity="0.12"/>
    <rect x="120" y="68" width="46" height="62" rx="5" fill="#FAF9F5" opacity="0.12"/>
    <rect x="172" y="68" width="46" height="62" rx="5" fill="#FAF9F5" opacity="0.12"/>
    <!-- Accent line -->
    <rect x="16" y="58" width="80" height="3" rx="1.5" fill="#7b78d8"/>
  </svg>
</template>
</head>
<body>
<div id="root"></div>

<script type="text/babel" src="Header.jsx"></script>
<script type="text/babel" src="ProductCard.jsx"></script>
<script type="text/babel" src="FilterBar.jsx"></script>
<script type="text/babel" src="ProductDetail.jsx"></script>

<script type="text/babel">
const PRODUCTS = [
  { id:1, brand:'Maison Royale', name:'Oud Noir', category:'Oud & Oriental', size:'50ml', variants:3, moq:12, price:'$14.00', badge:null, bottleColor:'#b8a890', description:'A rich, smoky oud blended with dark amber and sandalwood. Long-lasting projection ideal for evening wear. Popular with Middle Eastern and South Asian wholesale buyers.' },
  { id:2, brand:'Aqua Verte', name:'Brise de Mer', category:'Aquatic', size:'100ml', variants:2, moq:6, price:'$18.50', badge:'Limited', bottleColor:'#9ab4bc', description:'Fresh sea breeze accord with bergamot, sea salt, and white musk. A crowd-pleasing unisex fragrance with excellent seasonal appeal.' },
  { id:3, brand:'Fleur & Co', name:'Rose Centifolia', category:'Floral', size:'30ml', variants:5, moq:24, price:'$22.00', badge:'New', bottleColor:'#c4a0ac', description:'Award-winning Bulgarian rose extract with delicate peony and soft cedar drydown. Premium positioning, suitable for luxury gifting.' },
  { id:4, brand:'Orient & Wood', name:'Ambre Sauvage', category:'Woody', size:'75ml', variants:2, moq:12, price:'$16.00', badge:null, bottleColor:'#c8a870', description:'Wild amber with a smoky vetiver heart and warm benzoin base. A bold statement fragrance with excellent longevity and trail.' },
  { id:5, brand:'Citrus Lab', name:'Neroli Bianco', category:'Citrus', size:'50ml', variants:3, moq:12, price:'$12.50', badge:null, bottleColor:'#d4c890', description:'Italian neroli distilled with petitgrain and light musk. Clean, versatile daytime fragrance with a loyal retail following.' },
  { id:6, brand:'Maison Royale', name:'Velours Noir', category:'Oud & Oriental', size:'100ml', variants:4, moq:6, price:'$28.00', badge:'Exclusive', bottleColor:'#888090', description:'Exclusive black velvet accord with saffron, rose, and oud. Limited to 200 wholesale units per season. Prestige positioning.' },
  { id:7, brand:'Jardin Sec', name:'Figuier Sauvage', category:'Fresh', size:'50ml', variants:2, moq:18, price:'$15.00', badge:null, bottleColor:'#a8b898', description:'Wild fig with green leaf accord, cedarwood, and earthy undertones. Sophisticated unisex fragrance inspired by Mediterranean gardens.' },
  { id:8, brand:'Fleur & Co', name:'Iris Poudré', category:'Floral', size:'50ml', variants:3, moq:12, price:'$19.50', badge:'New', bottleColor:'#b4a8c0', description:'Powdery iris with soft violet and white sandalwood. A refined floral for premium retail environments and boutique gifting.' },
];

const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
  "accentColor": "#4D49BE",
  "cardColumns": 4,
  "showHero": true
}/*EDITMODE-END*/;

// Tweaks panel
const TweaksPanel = ({ visible, tweaks, setTweaks }) => {
  if (!visible) return null;
  return (
    <div style={{ position:'fixed', bottom:24, right:24, background:'#fff', border:'1.5px solid #EEEEEE', borderRadius:14, padding:'20px 22px', width:260, boxShadow:'0 8px 32px rgba(0,0,0,0.12)', zIndex:300, fontFamily:'Outfit, sans-serif' }}>
      <div style={{ fontSize:11, fontWeight:700, letterSpacing:'0.12em', textTransform:'uppercase', color:'#949494', marginBottom:16 }}>Tweaks</div>
      <label style={{ display:'flex', flexDirection:'column', gap:5, marginBottom:14 }}>
        <span style={{ fontSize:12, fontWeight:500, color:'#141413' }}>Accent Color</span>
        <div style={{ display:'flex', gap:8, alignItems:'center' }}>
          <input type="color" value={tweaks.accentColor} onChange={e => setTweaks(t => ({...t, accentColor: e.target.value}))} style={{ width:36, height:28, border:'none', borderRadius:4, cursor:'pointer', padding:0 }} />
          <span style={{ fontSize:12, color:'#949494' }}>{tweaks.accentColor}</span>
        </div>
      </label>
      <label style={{ display:'flex', flexDirection:'column', gap:5, marginBottom:14 }}>
        <span style={{ fontSize:12, fontWeight:500, color:'#141413' }}>Grid Columns</span>
        <div style={{ display:'flex', gap:8 }}>
          {[2,3,4].map(n => (
            <button key={n} onClick={() => setTweaks(t => ({...t, cardColumns: n}))}
              style={{ flex:1, padding:'6px 0', fontSize:12, fontWeight:600, borderRadius:6, border:'1.5px solid', borderColor: tweaks.cardColumns === n ? '#141413':'#EEEEEE', background: tweaks.cardColumns === n ? '#141413':'#fff', color: tweaks.cardColumns === n ? '#fff':'#141413', cursor:'pointer' }}>
              {n}
            </button>
          ))}
        </div>
      </label>
      <label style={{ display:'flex', alignItems:'center', gap:10, cursor:'pointer' }}>
        <input type="checkbox" checked={tweaks.showHero} onChange={e => setTweaks(t => ({...t, showHero: e.target.checked}))} style={{ width:14, height:14 }} />
        <span style={{ fontSize:12, fontWeight:500, color:'#141413' }}>Show Hero Banner</span>
      </label>
    </div>
  );
};

// Hero section
const Hero = ({ accent }) => (
  <div style={{ background: '#141413', padding: '64px 40px', textAlign:'center' }}>
    <div style={{ fontSize:11, fontWeight:600, letterSpacing:'0.2em', textTransform:'uppercase', color:'rgba(255,255,255,0.5)', marginBottom:16 }}>Wholesale Catalogue — Spring 2026</div>
    <h1 style={{ fontFamily:"'Fraunces', serif", fontSize:52, fontWeight:700, color:'#fff', lineHeight:1.1, letterSpacing:'-0.02em', marginBottom:16 }}>Fragrance for<br/><em style={{ fontStyle:'italic', color: accent }}>Trade Buyers</em></h1>
    <p style={{ fontSize:15, color:'rgba(255,255,255,0.6)', maxWidth:480, margin:'0 auto 32px', lineHeight:1.6 }}>A clean public catalogue for wholesale discovery. Browse 48 fragrances from 12 houses — then request a quote directly.</p>
    <div style={{ display:'flex', justifyContent:'center', gap:12 }}>
      <button style={{ background:'#fff', color:'#141413', border:'none', borderRadius:8, padding:'13px 28px', fontSize:12, fontWeight:700, letterSpacing:'0.1em', textTransform:'uppercase', cursor:'pointer' }}>Browse All Products</button>
      <button style={{ background:'transparent', color:'#fff', border:'1.5px solid rgba(255,255,255,0.3)', borderRadius:8, padding:'13px 28px', fontSize:12, fontWeight:700, letterSpacing:'0.1em', textTransform:'uppercase', cursor:'pointer', display:'flex', alignItems:'center', gap:8 }}>
        <svg width="15" height="15" viewBox="0 0 24 24" fill="currentColor"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413z"/></svg>
        WhatsApp Us
      </button>
    </div>
  </div>
);

// Quote request form
const QuoteForm = ({ product, onClose }) => {
  const [submitted, setSubmitted] = React.useState(false);
  return (
    <div style={{ position:'fixed', inset:0, background:'rgba(0,0,0,0.85)', zIndex:400, display:'flex', alignItems:'center', justifyContent:'center' }} onClick={onClose}>
      <div style={{ background:'#fff', borderRadius:16, width:480, padding:'40px', position:'relative' }} onClick={e => e.stopPropagation()}>
        <button onClick={onClose} style={{ position:'absolute', top:16, right:16, background:'none', border:'none', cursor:'pointer' }}>
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#141413" strokeWidth="1.5"><path d="M18 6 6 18M6 6l12 12"/></svg>
        </button>
        {submitted ? (
          <div style={{ textAlign:'center', padding:'20px 0' }}>
            <div style={{ fontSize:32, marginBottom:12 }}>✦</div>
            <div style={{ fontFamily:"'Fraunces',serif", fontSize:24, fontWeight:700, color:'#141413', marginBottom:8 }}>Quote Requested</div>
            <p style={{ fontSize:14, color:'#949494', lineHeight:1.6 }}>Our team will be in touch within 24 hours.<br/>Alternatively, WhatsApp us for an immediate response.</p>
          </div>
        ) : (
          <>
            <div style={{ fontSize:11, fontWeight:700, letterSpacing:'0.16em', textTransform:'uppercase', color:'#949494', marginBottom:8 }}>Request a Quote</div>
            <div style={{ fontFamily:"'Fraunces',serif", fontSize:22, fontWeight:700, color:'#141413', marginBottom:24 }}>{product ? product.name : 'General Enquiry'}</div>
            <div style={{ display:'flex', flexDirection:'column', gap:14 }}>
              {[['Company Name','e.g. Maison Parfums Ltd'],['Contact Name','Your full name'],['Email','trade@example.com'],['Units Required','e.g. 50 units per SKU']].map(([label, placeholder]) => (
                <div key={label}>
                  <div style={{ fontSize:10, fontWeight:700, letterSpacing:'0.1em', textTransform:'uppercase', color:'#141413', marginBottom:5 }}>{label}</div>
                  <input placeholder={placeholder} style={{ width:'100%', border:'1.5px solid #EEEEEE', borderRadius:6, padding:'10px 14px', fontSize:14, color:'#141413', outline:'none', fontFamily:'Outfit,sans-serif' }} />
                </div>
              ))}
            </div>
            <button onClick={() => setSubmitted(true)} style={{ marginTop:24, width:'100%', background:'#141413', color:'#fff', border:'none', borderRadius:8, padding:'14px 0', fontSize:12, fontWeight:700, letterSpacing:'0.1em', textTransform:'uppercase', cursor:'pointer' }}>Submit Quote Request</button>
          </>
        )}
      </div>
    </div>
  );
};

// Brands page
const BrandsPage = ({ setPage }) => {
  const brands = [
    { name:'Maison Royale', count:8, note:'Oud & Oriental specialists. Est. 2008.' },
    { name:'Aqua Verte', count:5, note:'Fresh aquatic and marine accords.' },
    { name:'Fleur & Co', count:12, note:'Award-winning florals. Premium positioning.' },
    { name:'Orient & Wood', count:6, note:'Woody and resinous Eastern-inspired scents.' },
    { name:'Citrus Lab', count:9, note:'Bright, energetic citrus expressions.' },
    { name:'Jardin Sec', count:4, note:'Green, earthy Mediterranean fragrances.' },
  ];
  return (
    <div style={{ maxWidth:900, margin:'0 auto', padding:'56px 40px' }}>
      <div style={{ fontSize:11, fontWeight:700, letterSpacing:'0.2em', textTransform:'uppercase', color:'#949494', marginBottom:12 }}>Wholesale Partners</div>
      <h1 style={{ fontFamily:"'Fraunces',serif", fontSize:40, fontWeight:700, color:'#141413', marginBottom:48, letterSpacing:'-0.02em' }}>Our Fragrance Houses</h1>
      <div style={{ display:'grid', gridTemplateColumns:'1fr 1fr', gap:2, borderTop:'1px solid #EEEEEE' }}>
        {brands.map(b => (
          <div key={b.name} style={{ padding:'28px 0', borderBottom:'1px solid #EEEEEE', cursor:'pointer' }} onClick={() => setPage('catalogue')}>
            <div style={{ fontSize:10, fontWeight:700, letterSpacing:'0.14em', textTransform:'uppercase', color:'#949494', marginBottom:6 }}>{b.count} products</div>
            <div style={{ fontFamily:"'Fraunces',serif", fontSize:22, fontWeight:600, color:'#141413', marginBottom:6 }}>{b.name}</div>
            <div style={{ fontSize:13, color:'#737373' }}>{b.note}</div>
          </div>
        ))}
      </div>
    </div>
  );
};

// Main App
const App = () => {
  const [page, setPage] = React.useState('catalogue');
  const [search, setSearch] = React.useState('');
  const [category, setCategory] = React.useState('All');
  const [sort, setSort] = React.useState('Featured');
  const [selectedProduct, setSelectedProduct] = React.useState(null);
  const [quoteProduct, setQuoteProduct] = React.useState(null);
  const [tweaksVisible, setTweaksVisible] = React.useState(false);
  const [tweaks, setTweaks] = React.useState(TWEAK_DEFAULTS);

  // Persist tweaks
  React.useEffect(() => {
    const saved = localStorage.getItem('rn_tweaks');
    if (saved) try { setTweaks(JSON.parse(saved)); } catch(e){}
  }, []);
  React.useEffect(() => {
    localStorage.setItem('rn_tweaks', JSON.stringify(tweaks));
    window.parent.postMessage({ type: '__edit_mode_set_keys', edits: tweaks }, '*');
  }, [tweaks]);

  // Tweaks toggle
  React.useEffect(() => {
    window.addEventListener('message', e => {
      if (e.data?.type === '__activate_edit_mode') setTweaksVisible(true);
      if (e.data?.type === '__deactivate_edit_mode') setTweaksVisible(false);
    });
    window.parent.postMessage({ type: '__edit_mode_available' }, '*');
  }, []);

  const filtered = PRODUCTS.filter(p => {
    const matchSearch = !search || p.name.toLowerCase().includes(search.toLowerCase()) || p.brand.toLowerCase().includes(search.toLowerCase());
    const matchCat = category === 'All' || p.category === category;
    return matchSearch && matchCat;
  });

  const sorted = [...filtered].sort((a,b) => {
    if (sort === 'Price: Low–High') return parseFloat(a.price.replace('$','')) - parseFloat(b.price.replace('$',''));
    if (sort === 'Price: High–Low') return parseFloat(b.price.replace('$','')) - parseFloat(a.price.replace('$',''));
    if (sort === 'Newest') return (b.badge === 'New' ? 1:0) - (a.badge === 'New' ? 1:0);
    return 0;
  });

  return (
    <div style={{ minHeight:'100vh', background:'#FAF9F5' }}>
      <Header onSearch={setSearch} searchValue={search} currentPage={page} setPage={setPage} />

      {page === 'brands' && <BrandsPage setPage={setPage} />}

      {page === 'catalogue' && (
        <>
          {tweaks.showHero && <Hero accent={tweaks.accentColor} />}
          <FilterBar activeCategory={category} setActiveCategory={setCategory} activeSort={sort} setActiveSort={setSort} />
          <div style={{ maxWidth:1200, margin:'0 auto', padding:'40px 40px 80px' }}>
            {sorted.length === 0 ? (
              <div style={{ textAlign:'center', padding:'80px 0', color:'#949494', fontSize:14 }}>No products match your current filters.</div>
            ) : (
              <>
                <div style={{ fontSize:12, color:'#949494', marginBottom:20 }}>{sorted.length} products</div>
                <div style={{ display:'grid', gridTemplateColumns:`repeat(${tweaks.cardColumns}, 1fr)`, gap:20 }}>
                  {sorted.map(p => (
                    <ProductCard key={p.id} product={p} onClick={setSelectedProduct} />
                  ))}
                </div>
              </>
            )}
          </div>
        </>
      )}

      {page === 'quote' && (
        <QuoteForm product={null} onClose={() => setPage('catalogue')} />
      )}

      {selectedProduct && (
        <ProductDetail
          product={selectedProduct}
          onClose={() => setSelectedProduct(null)}
          onQuote={p => { setSelectedProduct(null); setQuoteProduct(p); }}
        />
      )}

      {quoteProduct && (
        <QuoteForm product={quoteProduct} onClose={() => setQuoteProduct(null)} />
      )}

      <TweaksPanel visible={tweaksVisible} tweaks={tweaks} setTweaks={setTweaks} />
    </div>
  );
};

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
