document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

ud Noir',category:'Oud & Oriental',size:'50ml',variants:3,moq:12,price:14.00,badge:null,color:'#b8a890',bgColor:'#F5F5F5',description:'A rich, smoky oud blended with dark amber and sandalwood. Long-lasting projection ideal for evening wear. Popular with Middle Eastern and South Asian wholesale buyers.'},\n  {id:2,brand:'Aqua Verte',name:'Brise de Mer',category:'Aquatic',size:'100ml',variants:2,moq:6,price:18.50,badge:'Limited',color:'#9ab4bc',bgColor:'#F0F4F5',description:'Fresh sea breeze accord with bergamot, sea salt, and white musk. A crowd-pleasing unisex fragrance with excellent seasonal appeal.'},\n  {id:3,brand:'Fleur & Co',name:'Rose Centifolia',category:'Floral',size:'30ml',variants:5,moq:24,price:22.00,badge:'New',color:'#c4a0ac',bgColor:'#F7F2F4',description:'Award-winning Bulgarian rose extract with delicate peony and soft cedar drydown. Premium positioning, suitable for luxury gifting.'},\n  {id:4,brand:'Orient & Wood',name:'Ambre Sauvage',category:'Woody',size:'75ml',variants:2,moq:12,price:16.00,badge:null,color:'#c8a870',bgColor:'#F6F2EC',description:'Wild amber with a smoky vetiver heart and warm benzoin base. A bold statement fragrance with excellent longevity and trail.'},\n  {id:5,brand:'Citrus Lab',name:'Neroli Bianco',category:'Citrus',size:'50ml',variants:3,moq:12,price:12.50,badge:null,color:'#d4c890',bgColor:'#F6F5EC',description:'Italian neroli distilled with petitgrain and light musk. Clean, versatile daytime fragrance with a loyal retail following.'},\n  {id:6,brand:'Maison Royale',name:'Velours Noir',category:'Oud & Oriental',size:'100ml',variants:4,moq:6,price:28.00,badge:'Exclusive',color:'#888090',bgColor:'#F0EFF2',description:'Exclusive black velvet accord with saffron, rose, and oud. Limited to 200 wholesale units per season. Prestige positioning.'},\n  {id:7,brand:'Jardin Sec',name:'Figuier Sauvage',category:'Fresh',size:'50ml',variants:2,moq:18,price:15.00,badge:null,color:'#a8b898',bgColor:'#F0F3EE',description:'Wild fig with green leaf accord, cedarwood, and earthy undertones. Sophisticated unisex fragrance inspired by Mediterranean gardens.'},\n  {id:8,brand:'Fleur & Co',name:'Iris Poudré',category:'Floral',size:'50ml',variants:3,moq:12,price:19.50,badge:'New',color:'#b4a8c0',bgColor:'#F2F0F6',description:'Powdery iris with soft violet and white sandalwood. A refined floral for premium retail environments and boutique gifting.'},\n];\n\nlet currentCategory = 'All';\nlet currentProduct = null;\n\nfunction bottle(color, bgColor) {\n  return `<div class=\"card-img\" style=\"background:${bgColor}\">\n    <div class=\"bottle-wrap\">\n      <div class=\"bottle-cap\" style=\"background:${color};opacity:.7\"><\u002Fdiv>\n      <div class=\"bottle-body\" style=\"background:${color}\"><\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>`;\n}\n\nfunction badgeHTML(badge) {\n  if (!badge) return '';\n  const bg = badge === 'New' ? '#4D49BE' : '#141413';\n  return `<span class=\"badge\" style=\"background:${bg}\">${badge}<\u002Fspan>`;\n}\n\nfunction cardHTML(p) {\n  return `<div class=\"card\" onclick=\"openDetail(${p.id})\">\n    <div class=\"card-img\" style=\"background:${p.bgColor}\">\n      ${badgeHTML(p.badge)}\n      <div class=\"bottle-wrap\">\n        <div class=\"bottle-cap\" style=\"background:${p.color};opacity:.7\"><\u002Fdiv>\n        <div class=\"bottle-body\" style=\"background:${p.color}\"><\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"card-body\">\n      <div class=\"card-brand\">${p.brand}<\u002Fdiv>\n      <div class=\"card-name\">${p.name}<\u002Fdiv>\n      <div class=\"card-meta\">${p.size} · ${p.variants} variants · MOQ ${p.moq}<\u002Fdiv>\n      <div class=\"card-price\">From $${p.price.toFixed(2)} / unit<\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>`;\n}\n\nfunction filterProducts() {\n  const q = document.getElementById('search-input').value.toLowerCase();\n  const sort = document.getElementById('sort-select').value;\n  let list = PRODUCTS.filter(p => {\n    const matchQ = !q || p.name.toLowerCase().includes(q) || p.brand.toLowerCase().includes(q);\n    const matchCat = currentCategory === 'All' || p.category === currentCategory;\n    return matchQ && matchCat;\n  });\n  if (sort === 'Price: Low–High') list.sort((a,b) => a.price - b.price);\n  if (sort === 'Price: High–Low') list.sort((a,b) => b.price - a.price);\n  if (sort === 'Newest') list.sort((a,b) => (b.badge === 'New' ? 1:0) - (a.badge === 'New' ? 1:0));\n  const grid = document.getElementById('product-grid');\n  const empty = document.getElementById('empty-state');\n  document.getElementById('grid-count').textContent = list.length + ' products';\n  if (list.length === 0) { grid.innerHTML = ''; empty.style.display = 'block'; }\n  else { empty.style.display = 'none'; grid.innerHTML = list.map(cardHTML).join(''); }\n}\n\nfunction setCategory(el, cat) {\n  currentCategory = cat;\n  document.querySelectorAll('.tag').forEach(t => t.classList.remove('active'));\n  el.classList.add('active');\n  filterProducts();\n}\n\nfunction showPage(page) {\n  document.getElementById('page-catalogue').style.display = page === 'catalogue' ? '' : 'none';\n  document.getElementById('page-brands').style.display = page === 'brands' ? '' : 'none';\n}\n\nfunction openDetail(id) {\n  currentProduct = PRODUCTS.find(p => p.id === id);\n  const p = currentProduct;\n  document.getElementById('panel-img').innerHTML = `\n    <div style=\"width:100%;height:100%;background:${p.bgColor};display:flex;align-items:center;justify-content:center;position:relative\">\n      ${badgeHTML(p.badge)}\n      <div class=\"bottle-wrap\" style=\"transform:scale(1.5)\">\n        <div class=\"bottle-cap\" style=\"background:${p.color};opacity:.7\"><\u002Fdiv>\n        <div class=\"bottle-body\" style=\"background:${p.color}\"><\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>`;\n  document.getElementById('panel-brand').textContent = p.brand;\n  document.getElementById('panel-name').textContent = p.name;\n  document.getElementById('panel-cat').textContent = p.category;\n  document.getElementById('panel-desc').textContent = p.description;\n  document.getElementById('panel-moq').textContent = p.moq + ' units';\n  const sizes = [p.size, '50ml', '100ml'].filter((v,i,a) => a.indexOf(v) === i).slice(0,3);\n  const prices = [p.price, +(p.price*1.5).toFixed(2), +(p.price*2.4).toFixed(2)];\n  const stocks = ['In Stock','In Stock','Low Stock'];\n  document.getElementById('panel-variants').innerHTML = sizes.map((s,i) => `\n    <div class=\"variant${i===0?' active':''}\" onclick=\"selectVariant(this)\">\n      <div class=\"variant-size\">${s}<\u002Fdiv>\n      <div class=\"variant-price\">$${prices[i].toFixed(2)}<\u002Fdiv>\n      <div class=\"variant-stock\" style=\"color:${stocks[i]==='In Stock'?'#949494':'#C0392B'}\">${stocks[i]}<\u002Fdiv>\n    <\u002Fdiv>`).join('');\n  document.getElementById('panel-quote-btn').onclick = () => { closeDetailBtn(); openQuote(p); };\n  document.getElementById('detail-overlay').classList.add('open');\n  document.body.style.overflow = 'hidden';\n}\n\nfunction selectVariant(el) {\n  document.querySelectorAll('.variant').forEach(v => v.classList.remove('active'));\n  el.classList.add('active');\n}\n\nfunction closeDetail(e) { if (e.target === document.getElementById('detail-overlay')) closeDetailBtn(); }\nfunction closeDetailBtn() {\n  document.getElementById('detail-overlay').classList.remove('open');\n  document.body.style.overflow = '';\n}\n\nfunction openQuote(product) {\n  document.getElementById('quote-title').textContent = product ? product.name : 'General Enquiry';\n  document.getElementById('quote-form').style.display = '';\n  document.getElementById('quote-success').style.display = 'none';\n  document.getElementById('quote-overlay').classList.add('open');\n  document.body.style.overflow = 'hidden';\n}\n\nfunction closeQuote(e) { if (e.target === document.getElementById('quote-overlay')) closeQuoteBtn(); }\nfunction closeQuoteBtn() {\n  document.getElementById('quote-overlay').classList.remove('open');\n  document.body.style.overflow = '';\n}\n\nfunction submitQuote() {\n  document.getElementById('quote-form').style.display = 'none';\n  document.getElementById('quote-success').style.display = '';\n}\n\n// Init\nfilterProducts();\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>
</body>
