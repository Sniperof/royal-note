<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #fff; font-family: 'Inter', sans-serif; padding: 20px; }
  .row { display: flex; gap: 6px; align-items: flex-end; }
  .swatch { display: flex; flex-direction: column; gap: 5px; }
  .chip { width: 56px; border-radius: 6px; }
  .label { font-size: 9px; font-weight: 600; color: #141413; letter-spacing: 0.06em; text-transform: uppercase; }
  .hex  { font-size: 9px; color: #949494; }
  .section-label { font-size: 9px; font-weight: 600; letter-spacing: 0.12em; text-transform: uppercase; color: #949494; margin-bottom: 10px; }
</style>
</head>
<body>
<div class="section-label">Neutral Scale</div>
<div class="row">
  <div class="swatch"><div class="chip" style="height:24px;background:#FAFAFA;border:1px solid #eee"></div><div class="label">50</div><div class="hex">#FAFAFA</div></div>
  <div class="swatch"><div class="chip" style="height:28px;background:#F5F5F5;border:1px solid #eee"></div><div class="label">100</div><div class="hex">#F5F5F5</div></div>
  <div class="swatch"><div class="chip" style="height:32px;background:#EEEEEE"></div><div class="label">200</div><div class="hex">#EEEEEE</div></div>
  <div class="swatch"><div class="chip" style="height:36px;background:#D4D4D4"></div><div class="label">300</div><div class="hex">#D4D4D4</div></div>
  <div class="swatch"><div class="chip" style="height:40px;background:#A3A3A3"></div><div class="label">400</div><div class="hex">#A3A3A3</div></div>
  <div class="swatch"><div class="chip" style="height:44px;background:#949494"></div><div class="label">500*</div><div class="hex">#949494</div></div>
  <div class="swatch"><div class="chip" style="height:48px;background:#737373"></div><div class="label">600</div><div class="hex">#737373</div></div>
  <div class="swatch"><div class="chip" style="height:52px;background:#525252"></div><div class="label">700</div><div class="hex">#525252</div></div>
  <div class="swatch"><div class="chip" style="height:56px;background:#404040"></div><div class="label">800</div><div class="hex">#404040</div></div>
  <div class="swatch"><div class="chip" style="height:60px;background:#262626"></div><div class="label">900</div><div class="hex">#262626</div></div>
  <div class="swatch"><div class="chip" style="height:64px;background:#141413"></div><div class="label">950</div><div class="hex">#141413</div></div>
</div>
</body>
</html>
