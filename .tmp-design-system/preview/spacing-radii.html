<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #fff; font-family: 'Inter', sans-serif; padding: 20px 24px; }
  .section-label { font-size: 9px; font-weight: 600; letter-spacing: 0.12em; text-transform: uppercase; color: #949494; margin-bottom: 12px; margin-top: 20px; }
  .section-label:first-child { margin-top: 0; }
  .row { display: flex; gap: 16px; align-items: center; flex-wrap: wrap; }
  .item { display: flex; flex-direction: column; align-items: center; gap: 6px; }
  .box { width: 56px; height: 40px; background: #FAF9F5; border: 1px solid #EEEEEE; }
  .label { font-size: 9px; color: #949494; }
  .shadow-row { display: flex; gap: 24px; flex-wrap: wrap; }
  .shadow-item { display: flex; flex-direction: column; align-items: center; gap: 8px; }
  .shadow-box { width: 72px; height: 48px; background: #fff; border-radius: 8px; }
  .s-label { font-size: 9px; color: #949494; text-align: center; }
</style>
</head>
<body>
  <div class="section-label">Border Radius</div>
  <div class="row">
    <div class="item"><div class="box" style="border-radius:4px"></div><div class="label">sm · 4px</div></div>
    <div class="item"><div class="box" style="border-radius:8px"></div><div class="label">md · 8px (btn)</div></div>
    <div class="item"><div class="box" style="border-radius:12px"></div><div class="label">lg · 12px (card)</div></div>
    <div class="item"><div class="box" style="border-radius:16px"></div><div class="label">xl · 16px</div></div>
    <div class="item"><div class="box" style="border-radius:6px;width:80px;height:28px"></div><div class="label">input · 6px</div></div>
    <div class="item"><div style="background:#141413;color:#fff;font-size:9px;font-weight:600;letter-spacing:0.1em;padding:4px 14px;border-radius:999px">LIMITED</div><div class="label">pill · badge</div></div>
  </div>

  <div class="section-label">Shadow System</div>
  <div class="shadow-row">
    <div class="shadow-item"><div class="shadow-box" style="box-shadow:0 1px 2px rgba(0,0,0,0.04);border:1px solid #eee"></div><div class="s-label">xs</div></div>
    <div class="shadow-item"><div class="shadow-box" style="box-shadow:0 1px 4px rgba(0,0,0,0.06),0 0 0 1px rgba(0,0,0,0.04)"></div><div class="s-label">sm · card</div></div>
    <div class="shadow-item"><div class="shadow-box" style="box-shadow:0 4px 16px rgba(0,0,0,0.10)"></div><div class="s-label">md · hover</div></div>
    <div class="shadow-item"><div class="shadow-box" style="box-shadow:0 8px 32px rgba(0,0,0,0.12)"></div><div class="s-label">lg · modal</div></div>
    <div class="shadow-item"><div class="shadow-box" style="box-shadow:0 0 0 2px #4D49BE"></div><div class="s-label">focus ring</div></div>
  </div>
</body>
</html>
