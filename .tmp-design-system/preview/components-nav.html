<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #fff; font-family: 'Inter', sans-serif; }

  nav { height: 64px; background: #fff; border-bottom: 1px solid #EEEEEE; display: flex; align-items: center; padding: 0 32px; gap: 24px; }
  .nav-left { display: flex; gap: 20px; align-items: center; }
  .nav-link { font-size: 12px; font-weight: 500; letter-spacing: 0.06em; text-transform: uppercase; color: #141413; text-decoration: none; cursor: pointer; white-space: nowrap; }
  .nav-link:hover { color: #4D49BE; }
  .logo-wrap { flex: 1; display: flex; justify-content: center; align-items: center; gap: 8px; }
  .logo-mark { display: flex; align-items: center; gap: 6px; }
  .logo-wordmark { font-family: 'Playfair Display', serif; font-size: 20px; font-weight: 600; color: #141413; letter-spacing: -0.02em; }
  .nav-right { display: flex; gap: 16px; align-items: center; }
  .nav-btn { font-size: 11px; font-weight: 600; letter-spacing: 0.1em; text-transform: uppercase; padding: 7px 14px; border-radius: 8px; cursor: pointer; }
  .nav-btn-ghost { background: transparent; border: 1.5px solid #EEEEEE; color: #141413; }
  .nav-btn-dark  { background: #141413; border: none; color: #fff; }
  .search-bar { background: #FAF9F5; border: 1.5px solid #EEEEEE; border-radius: 6px; display: flex; align-items: center; gap: 8px; padding: 7px 12px; width: 220px; }
  .search-bar input { border: none; background: transparent; font-family: 'Inter', sans-serif; font-size: 13px; color: #141413; outline: none; width: 100%; }
  .search-bar input::placeholder { color: #949494; }

  /* sparkle icon */
  .sparkle { width: 20px; height: 20px; }
</style>
</head>
<body>
  <nav>
    <div class="nav-left">
      <span class="nav-link">Catalogue</span>
      <span class="nav-link">Brands</span>
      <span class="nav-link">About</span>
    </div>
    <div class="logo-wrap">
      <div class="logo-mark">
        <svg class="sparkle" viewBox="0 0 24 24" fill="none">
          <line x1="12" y1="2" x2="12" y2="22" stroke="#141413" stroke-width="1.5" stroke-linecap="round"/>
          <line x1="2" y1="12" x2="22" y2="12" stroke="#141413" stroke-width="1.5" stroke-linecap="round"/>
          <line x1="4.93" y1="4.93" x2="19.07" y2="19.07" stroke="#141413" stroke-width="1.5" stroke-linecap="round"/>
          <line x1="19.07" y1="4.93" x2="4.93" y2="19.07" stroke="#141413" stroke-width="1.5" stroke-linecap="round"/>
        </svg>
        <span class="logo-wordmark">Royal Note</span>
      </div>
    </div>
    <div class="nav-right">
      <div class="search-bar">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#949494" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
        <input placeholder="Search fragrances…" />
      </div>
      <button class="nav-btn nav-btn-ghost">Staff Login</button>
      <button class="nav-btn nav-btn-dark">Request Quote</button>
    </div>
  </nav>
</body>
</html>
