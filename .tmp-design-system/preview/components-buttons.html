<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #fff; font-family: 'Inter', sans-serif; padding: 20px 24px; }
  .row { display: flex; gap: 12px; align-items: center; flex-wrap: wrap; margin-bottom: 16px; }
  .row:last-child { margin-bottom: 0; }
  .section-label { font-size: 9px; font-weight: 600; letter-spacing: 0.12em; text-transform: uppercase; color: #949494; margin-bottom: 10px; margin-top: 16px; }
  .section-label:first-child { margin-top: 0; }

  /* Button base */
  .btn { display: inline-flex; align-items: center; gap: 8px; font-family: 'Inter', sans-serif; font-size: 12px; font-weight: 600; letter-spacing: 0.1em; text-transform: uppercase; border-radius: 8px; padding: 10px 20px; cursor: pointer; border: none; transition: all 0.2s ease; }

  /* Variants */
  .btn-primary   { background: #141413; color: #fff; }
  .btn-secondary { background: transparent; color: #141413; border: 1.5px solid #141413; }
  .btn-accent    { background: #4D49BE; color: #fff; }
  .btn-whatsapp  { background: #25D366; color: #fff; }
  .btn-ghost     { background: transparent; color: #141413; border: 1.5px solid #EEEEEE; }
  .btn-sm        { font-size: 11px; padding: 7px 14px; border-radius: 6px; }
  .btn-lg        { font-size: 13px; padding: 14px 28px; border-radius: 8px; }
  .btn-disabled  { background: #EEEEEE; color: #A3A3A3; cursor: not-allowed; }

  /* Icon placeholder */
  .icon { width: 14px; height: 14px; display: inline-flex; align-items: center; justify-content: center; }
</style>
</head>
<body>
  <div class="section-label">Primary Actions</div>
  <div class="row">
    <button class="btn btn-primary">Request a Quote</button>
    <button class="btn btn-accent">View Catalogue</button>
    <button class="btn btn-whatsapp">
      <svg class="icon" viewBox="0 0 24 24" fill="currentColor"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413z"/></svg>
      WhatsApp Us
    </button>
  </div>

  <div class="section-label">Secondary & States</div>
  <div class="row">
    <button class="btn btn-secondary">Staff Login</button>
    <button class="btn btn-ghost">Save to List</button>
    <button class="btn btn-primary btn-sm">Enquire</button>
    <button class="btn btn-primary btn-lg">Browse All Products</button>
    <button class="btn btn-disabled" disabled>Unavailable</button>
  </div>
</body>
</html>
