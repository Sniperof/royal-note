<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #FAF9F5; font-family: 'Inter', sans-serif; padding: 20px; display: flex; gap: 16px; flex-wrap: wrap; align-items: flex-start; }

  .card { background: #fff; border-radius: 14px; overflow: hidden; width: 160px; box-shadow: 0 1px 4px rgba(0,0,0,0.06), 0 0 0 1px rgba(0,0,0,0.04); transition: all 0.2s ease; cursor: pointer; }
  .card:hover { box-shadow: 0 4px 16px rgba(0,0,0,0.10); transform: translateY(-2px); }

  .card-img { width: 100%; height: 130px; background: #F5F5F5; display: flex; align-items: center; justify-content: center; position: relative; }
  .card-img-inner { width: 60px; height: 90px; background: linear-gradient(160deg, #e8e4de 0%, #d4cfc8 100%); border-radius: 4px; display: flex; align-items: center; justify-content: center; }
  .bottle-cap { width: 16px; height: 10px; background: #bbb; border-radius: 2px 2px 0 0; margin: 0 auto; }
  .bottle-body { width: 28px; height: 56px; background: linear-gradient(160deg, #c8c3bb 0%, #a09890 100%); border-radius: 3px; margin-top: 2px; }

  .badge { position: absolute; top: 8px; left: 8px; background: #141413; color: #fff; font-size: 8px; font-weight: 700; letter-spacing: 0.12em; text-transform: uppercase; padding: 3px 8px; border-radius: 999px; }

  .card-body { padding: 12px; }
  .brand { font-size: 9px; font-weight: 600; letter-spacing: 0.14em; text-transform: uppercase; color: #949494; margin-bottom: 4px; }
  .name  { font-family: 'Playfair Display', serif; font-size: 14px; font-weight: 600; color: #141413; line-height: 1.3; margin-bottom: 4px; }
  .meta  { font-size: 11px; color: #949494; margin-bottom: 10px; }
  .price { font-size: 13px; font-weight: 600; color: #141413; }

  .card-hover { box-shadow: 0 4px 16px rgba(0,0,0,0.10); transform: translateY(-2px); }
</style>
</head>
<body>
  <!-- Default card -->
  <div class="card">
    <div class="card-img">
      <div class="card-img-inner">
        <div>
          <div class="bottle-cap"></div>
          <div class="bottle-body"></div>
        </div>
      </div>
    </div>
    <div class="card-body">
      <div class="brand">Maison Royale</div>
      <div class="name">Oud Noir</div>
      <div class="meta">50ml · 3 variants</div>
      <div class="price">From $14.00 / unit</div>
    </div>
  </div>

  <!-- Card with badge -->
  <div class="card">
    <div class="card-img">
      <span class="badge">Limited</span>
      <div class="card-img-inner" style="background:linear-gradient(160deg,#dde4e8 0%,#c8d4d8 100%)">
        <div>
          <div class="bottle-cap" style="background:#aac"></div>
          <div class="bottle-body" style="background:linear-gradient(160deg,#b8c8cc 0%,#8a9ea4 100%)"></div>
        </div>
      </div>
    </div>
    <div class="card-body">
      <div class="brand">Aqua Verte</div>
      <div class="name">Brise de Mer</div>
      <div class="meta">100ml · MOQ 6</div>
      <div class="price">From $18.50 / unit</div>
    </div>
  </div>

  <!-- Accent badge card -->
  <div class="card">
    <div class="card-img">
      <span class="badge" style="background:#4D49BE">New</span>
      <div class="card-img-inner" style="background:linear-gradient(160deg,#e8dde4 0%,#d4c8ce 100%)">
        <div>
          <div class="bottle-cap" style="background:#c0aab4"></div>
          <div class="bottle-body" style="background:linear-gradient(160deg,#c8b8be 0%,#a08090 100%)"></div>
        </div>
      </div>
    </div>
    <div class="card-body">
      <div class="brand">Fleur & Co</div>
      <div class="name">Rose Centifolia</div>
      <div class="meta">30ml · 5 variants</div>
      <div class="price">From $22.00 / unit</div>
    </div>
  </div>

  <!-- Hover state card -->
  <div class="card card-hover">
    <div class="card-img">
      <div class="card-img-inner" style="background:linear-gradient(160deg,#ede8de 0%,#d8d0c0 100%)">
        <div>
          <div class="bottle-cap" style="background:#c8b890"></div>
          <div class="bottle-body" style="background:linear-gradient(160deg,#d4c8a8 0%,#b0a070 100%)"></div>
        </div>
      </div>
    </div>
    <div class="card-body">
      <div class="brand">Orient & Wood</div>
      <div class="name">Ambre Sauvage</div>
      <div class="meta">75ml · 2 variants</div>
      <div class="price">From $16.00 / unit</div>
    </div>
  </div>
</body>
</html>
