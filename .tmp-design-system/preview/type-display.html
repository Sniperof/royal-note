<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #fff; font-family: 'Inter', sans-serif; padding: 24px 28px; }
  .row { margin-bottom: 18px; border-bottom: 1px solid #EEEEEE; padding-bottom: 18px; }
  .row:last-child { border-bottom: none; margin-bottom: 0; padding-bottom: 0; }
  .meta { font-size: 10px; color: #949494; letter-spacing: 0.06em; text-transform: uppercase; margin-bottom: 4px; }
</style>
</head>
<body>
  <div class="row">
    <div class="meta">Display · Playfair Display · 42px · Bold</div>
    <div style="font-family:'Playfair Display',serif;font-size:42px;font-weight:700;line-height:1.15;letter-spacing:-0.02em;color:#141413">Wholesale Fragrance</div>
  </div>
  <div class="row">
    <div class="meta">Heading 2 · Playfair Display · 32px · Semibold</div>
    <div style="font-family:'Playfair Display',serif;font-size:32px;font-weight:600;line-height:1.2;color:#141413">Featured Collections</div>
  </div>
  <div class="row">
    <div class="meta">Heading 3 · Playfair Display · 24px · Medium · Italic</div>
    <div style="font-family:'Playfair Display',serif;font-size:24px;font-weight:400;font-style:italic;line-height:1.3;color:#141413">Oud & Amber Accord</div>
  </div>
</body>
</html>
